<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- <link rel="stylesheet" href="bs5/bootstrap-icons.min.css"> -->
    <link rel="stylesheet" href="bs5/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="container-fluid">
    <form action="" class="card p-4 rounded-4 shadow-lg border-0">
        <h3 class="text-white text-center mb-3">خوش آمدید</h3>
        <p class="text text-center mb-5 ">برای ادامه لطفا وارد حساب کاربری خود شوید</p>
        <div class="inf mb-3">
            <label for="phonenumber" class="text-white mb-1" >شماره موبایل</label>
            <div class="input-group">
                 <span class="input-group-text  rounded-0 rounded-end-1 border-0 ps-0"><i class="bi bi-phone"></i></span>
                <input type="number"  class="form-control  text-white border-0 rounded-0 rounded-start-1" placeholder="09123456789">
            </div>
        </div>

        <div class="inf mb-3">
             <label for="password" class="text-white mb-1">رمز عبور</label>
            <div class="input-group">
                <span class="input-group-text  rounded-0 rounded-end-1 border-0 ps-0"><i class="bi bi-lock"></i></span>
                <input type="password"  class="form-control  text-white border-0 rounded-0 rounded-start-1" placeholder="رمز عبور خود را وارد کنید">
            </div>
        </div>

          <div class="form-check mb-4  d-flex">
               <input type="checkbox" class=" form-check-input border-0 ">
            
              <label for="rememberme" class="text mx-4 px-1" >مرا به خاطر بسپار</label> 
        </div>

        <button class="enter btn  text-white fw-medium mb-3">
              <i class="bi bi-box-arrow-in-right"></i> ورود به سیستم
        </button>
        <div class="footer text-center  ">
            <p class="text small mt-3 mb-2">کاربر عادی هستید</p>
            <button class="btn bg-transparent text-white border-light px-3 py-1"><i class="bi bi-person-circle"></i> ورود به پنل کابری</button>
        </div>

    </form>
</body>
</html>
